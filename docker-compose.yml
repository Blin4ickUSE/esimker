services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    env_file: .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DB_PATH: data/data.db
      ENVIRONMENT: production
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${API_HTTP_PORT:-8082}:8000"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  bot:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.bot
    env_file: .env
    environment:
      DB_PATH: data/data.db
      ENVIRONMENT: production
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${telegram_bot_username:-}
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  panel:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.panel
    ports:
      - "${PANEL_HTTP_PORT:-8081}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  internal:
    driver: bridge
